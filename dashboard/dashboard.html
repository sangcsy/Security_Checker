<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 보안 구성 대시보드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Windows 보안 구성 대시보드</h1>
            <p class="subtitle">KISA 기술적 취약점 분석·평가 방법 상세가이드 기반</p>
        </header>

        <section class="upload-section">
            <div class="upload-box">
                <input type="file" id="fileInput" accept=".json" style="display: none;">
                <button id="uploadBtn" class="upload-btn">검사 결과 파일 선택 (JSON)</button>
                <p class="upload-hint">또는 파일을 여기로 드래그하세요</p>
            </div>
        </section>

        <section id="metadataSection" class="metadata-section" style="display: none;">
            <div class="metadata-grid">
                <div class="metadata-item">
                    <span class="metadata-label">검사 일시</span>
                    <span class="metadata-value" id="scanTime">-</span>
                </div>
                <div class="metadata-item">
                    <span class="metadata-label">컴퓨터 이름</span>
                    <span class="metadata-value" id="computerName">-</span>
                </div>
                <div class="metadata-item">
                    <span class="metadata-label">OS 버전</span>
                    <span class="metadata-value" id="osVersion">-</span>
                </div>
                <div class="metadata-item">
                    <span class="metadata-label">전체 검사 항목</span>
                    <span class="metadata-value" id="totalChecks">-</span>
                </div>
            </div>
        </section>

        <section id="summarySection" class="summary-section" style="display: none;">
            <h2>검사 결과 요약</h2>
            <div class="summary-grid">
                <div class="summary-card good">
                    <div class="summary-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" class="summary-icon-svg">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M7 12.5 10.2 15.5 17 8.5"></path>
                        </svg>
                    </div>
                    <div class="summary-content">
                        <div class="summary-label">양호</div>
                        <div class="summary-value" id="goodCount">0</div>
                    </div>
                </div>
                <div class="summary-card danger">
                    <div class="summary-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" class="summary-icon-svg">
                            <path d="M8.2 3.5h7.6l4.7 4.7v7.6l-4.7 4.7H8.2l-4.7-4.7V8.2z"></path>
                            <path d="M12 7.8v5.9"></path>
                            <path d="M12 15.9h.01"></path>
                        </svg>
                    </div>
                    <div class="summary-content">
                        <div class="summary-label">관리 필요</div>
                        <div class="summary-value" id="needsManagementCount">0</div>
                    </div>
                </div>
                <div class="summary-card warning">
                    <div class="summary-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" class="summary-icon-svg">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M9.25 9a2.75 2.75 0 1 1 4.7 1.94c-.82.8-1.7 1.34-1.7 2.56"></path>
                            <circle cx="12" cy="17" r="1"></circle>
                        </svg>
                    </div>
                    <div class="summary-content">
                        <div class="summary-label">수동 확인 필요</div>
                        <div class="summary-value" id="manualCheckCount">0</div>
                    </div>
                </div>
                <div class="summary-card disabled">
                    <div class="summary-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" class="summary-icon-svg">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M8 12H16"></path>
                        </svg>
                    </div>
                    <div class="summary-content">
                        <div class="summary-label">점검 불가</div>
                        <div class="summary-value" id="checkFailedCount">0</div>
                    </div>
                </div>
            </div>

            <div class="chart-container">
                <div class="chart-box">
                    <h3>상태별 분포</h3>
                    <canvas id="statusChart"></canvas>
                </div>
                <div class="chart-box">
                    <h3>카테고리별 분포</h3>
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
        </section>

        <section id="filterSection" class="filter-section" style="display: none;">
            <h2>검사 항목 필터</h2>
            <div class="filter-controls">
                <div class="filter-group">
                    <label for="statusFilter">상태</label>
                    <select id="statusFilter">
                        <option value="all">전체</option>
                        <option value="양호">양호</option>
                        <option value="관리 필요">관리 필요</option>
                        <option value="수동 확인 필요">수동 확인 필요</option>
                        <option value="점검 불가">점검 불가</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="categoryFilter">카테고리</label>
                    <select id="categoryFilter">
                        <option value="all">전체</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="severityFilter">심각도</label>
                    <select id="severityFilter">
                        <option value="all">전체</option>
                        <option value="상">상</option>
                        <option value="중">중</option>
                        <option value="하">하</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="searchInput">검색</label>
                    <input type="text" id="searchInput" placeholder="검사 항목 검색">
                </div>
            </div>
        </section>

        <section id="resultsSection" class="results-section" style="display: none;">
            <h2>상세 검사 결과</h2>
            <div class="results-stats">
                <span>총 <strong id="displayedCount">0</strong>개 항목 표시</span>
                <div class="export-actions">
                    <button id="reportBtn" class="export-btn report-btn">보고서 다운로드</button>
                    <button id="exportBtn" class="export-btn">CSV 내보내기</button>
                </div>
            </div>
            <div class="results-table-container">
                <table class="results-table">
                    <thead>
                        <tr>
                            <th>코드</th>
                            <th>카테고리</th>
                            <th>검사 항목</th>
                            <th>상태</th>
                            <th>심각도</th>
                            <th>현재 상태</th>
                            <th>상세</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTableBody"></tbody>
                </table>
            </div>
        </section>

        <div id="detailModal" class="modal">
            <div class="modal-content">
                <span class="modal-close">&times;</span>
                <h2>검사 항목 상세</h2>
                <div class="modal-body">
                    <div class="detail-group">
                        <label>검사 코드</label>
                        <p id="modalItemCode"></p>
                    </div>
                    <div class="detail-group">
                        <label>검사 항목</label>
                        <p id="modalCheckTitle"></p>
                    </div>
                    <div class="detail-group">
                        <label>카테고리</label>
                        <p id="modalCategory"></p>
                    </div>
                    <div class="detail-group">
                        <label>상태</label>
                        <p id="modalStatus" class="status-badge"></p>
                    </div>
                    <div class="detail-group">
                        <label>심각도</label>
                        <p id="modalSeverity"></p>
                    </div>
                    <div class="detail-group">
                        <label>현재 상태</label>
                        <p id="modalCurrentState"></p>
                    </div>
                    <div class="detail-group">
                        <label>권장 상태</label>
                        <p id="modalExpectedState"></p>
                    </div>
                    <div class="detail-group">
                        <label>운영 의미</label>
                        <p id="modalOperationalMeaning"></p>
                    </div>
                    <div class="detail-group">
                        <label>설명</label>
                        <p id="modalDescription"></p>
                    </div>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>Windows 보안 구성 검사 도구 v1.0.1</p>
        </footer>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
